<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pastelYellowPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="100%" stop-color="#FF6B9D" />
    </linearGradient>
    <linearGradient id="lightBluePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A1E5FF" />
      <stop offset="100%" stop-color="#FF6B9D" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FF6B9D" flood-opacity="0.1" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />
  <rect x="64" y="64" width="384" height="384" rx="96" fill="#FAFAFF" />

  <g filter="url(#softShadow)" transform="translate(10, 0)">
    <!-- R Stem: Soft Pink to Yellow Wave -->
    <path d="M 170 130 C 170 130, 150 220, 150 270 C 150 320, 170 380, 170 380" 
          fill="none" stroke="url(#pastelYellowPink)" stroke-width="48" stroke-linecap="round" />
    <!-- R Kickstand: Waves out to bottom-right -->
    <path d="M 210 260 C 240 280, 270 330, 290 380" 
          fill="none" stroke="url(#pastelYellowPink)" stroke-width="48" stroke-linecap="round" />
    <!-- Frosted Play Button Loop -->
    <path d="M 190 130 L 330 212 C 342 218, 342 226, 330 232 L 190 314" 
          fill="none" stroke="url(#lightBluePink)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
    <!-- Inside floating glass center play node -->
    <circle cx="235" cy="222" r="24" fill="#FFFFFF" fill-opacity="0.4" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="3" />
    <path d="M 230 212 L 246 222 L 230 232 Z" fill="#FF6B9D" />
  </g>
</svg>
