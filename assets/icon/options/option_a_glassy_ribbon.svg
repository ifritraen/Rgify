<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pinkYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5B80" /> <!-- Pastel Pink -->
      <stop offset="100%" stop-color="#FFE359" /> <!-- Light Yellow -->
    </linearGradient>
    <linearGradient id="blueCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A1E5FF" /> <!-- Light Blue -->
      <stop offset="100%" stop-color="#66CCFF" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#FF5B80" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />
  <!-- Background Card -->
  <rect x="64" y="64" width="384" height="384" rx="96" fill="#FFFBF2" stroke="#FF5B80" stroke-width="2" stroke-opacity="0.1" />
  
  <g filter="url(#shadow)">
    <!-- Kickstand -->
    <path d="M 215 255 L 295 367" stroke="url(#pinkYellow)" stroke-width="50" stroke-linecap="round" />
    <!-- Vertical Stem -->
    <rect x="150" y="120" width="50" height="272" rx="25" fill="url(#pinkYellow)" />
    <!-- Glass Loop / Play Button -->
    <path d="M 190 120 L 330 195 C 342 201, 342 209, 330 215 L 190 290 Z" 
          fill="#FFFFFF" fill-opacity="0.25" stroke="url(#blueCyan)" stroke-width="6" stroke-linejoin="round" />
    <!-- Inner yellow play icon -->
    <path d="M 225 165 L 290 202 L 225 240 Z" fill="#FFE359" />
  </g>
</svg>
