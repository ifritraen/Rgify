<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Cheerful Gradients -->
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55" /> <!-- Cheerful Hot Pink -->
      <stop offset="50%" stop-color="#FF5E3A" /> <!-- Vibrant Coral -->
      <stop offset="100%" stop-color="#FFD60A" /> <!-- Sunny Gold -->
    </linearGradient>

    <linearGradient id="neonCyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" /> <!-- Electric Cyan -->
      <stop offset="100%" stop-color="#0072FF" /> <!-- Bright Blue -->
    </linearGradient>

    <!-- Glass Dropshadow -->
    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#FF2D55" flood-opacity="0.15" />
    </filter>

    <!-- Refraction Shadows -->
    <filter id="refract" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Bright, Cheerful Pure White Canvas -->
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />

  <!-- 1. Vibrant Background Base (Sunny Sunset Squircle) -->
  <rect x="96" y="96" width="320" height="320" rx="80" fill="url(#sunsetGrad)" filter="url(#glassShadow)" />

  <!-- 2. Neon Cyan Play Core (Sits beneath the glass for refraction depth) -->
  <path d="M 230 196 L 316 256 L 230 316 Z" fill="url(#neonCyanGrad)" />

  <!-- 3. Glassmorphic Frosted Overlay (Minimalist Play Triangle & Stylized R Loop) -->
  <!-- We overlay a semi-transparent white shape that forms the R-stem and R-loop overlapping the play button -->
  <g filter="url(#refract)">
    <!-- Vertical stem of 'R' -->
    <rect x="176" y="160" width="32" height="192" rx="16" fill="#FFFFFF" fill-opacity="0.25" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="3" />

    <!-- Frosted Glass Play Button Triangle -->
    <path d="M 216 170 L 336 256 L 216 342 Z" 
          fill="#FFFFFF" 
          fill-opacity="0.22" 
          stroke="#FFFFFF" 
          stroke-opacity="0.6" 
          stroke-width="4.5" 
          stroke-linejoin="round" />

    <!-- A thin glossy light highlight reflection across the glass play button -->
    <path d="M 222 178 L 320 256 L 222 256 Z" 
          fill="#FFFFFF" 
          fill-opacity="0.12" />
  </g>
</svg>
