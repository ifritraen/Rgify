<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Cheerful Light Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F5F7FA" />
    </linearGradient>

    <!-- Vibrant Posh Pink/Orange Gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="100%" stop-color="#FF9933" />
    </linearGradient>

    <!-- Vibrant Posh Cyan/Blue Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33CCFF" />
      <stop offset="100%" stop-color="#3366FF" />
    </linearGradient>

    <!-- Subtle Shadows for Minimalism -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3366FF" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Circular Light Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="#3366FF" stroke-width="2" stroke-opacity="0.1" />

  <!-- Outer Elegant Posh Rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#cyanGrad)" stroke-width="3" stroke-opacity="0.4" />
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#pinkGrad)" stroke-width="1.5" stroke-opacity="0.3" />

  <!-- Play Button Vector / R Logo Accent -->
  <g transform="translate(140, 110)" filter="url(#subtleShadow)">
    <!-- R vertical leg -->
    <rect x="0" y="0" width="45" height="290" rx="15" fill="url(#pinkGrad)" />
    
    <!-- R loop -->
    <path d="M 40 0 C 130 0, 180 40, 180 110 C 180 170, 130 200, 40 200 Z" fill="none" stroke="url(#pinkGrad)" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Play button inside R loop / Vibrant core -->
    <path d="M 75 65 L 140 100 L 75 135 Z" fill="url(#cyanGrad)" />

    <!-- R leg kickout as a play arrow direction indicator -->
    <path d="M 100 180 L 195 290" stroke="url(#cyanGrad)" stroke-width="45" stroke-linecap="round" />
  </g>
</svg>
